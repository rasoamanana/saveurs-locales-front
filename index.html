<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Saveurs Locales</title>
    
    <!-- Google Fonts: Montserrat & Open Sans -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&family=Open+Sans:wght@400;600&display=swap" rel="stylesheet">
    
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="reset.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-flex">
            <!-- Logo (Gauche) -->
            <a href="#" class="logo">
                <i class="fas fa-leaf"></i>
                <span>Saveurs Locales</span>
            </a>

            <!-- Barre de recherche (Centre) -->
            <div class="search-bar">
                <input type="text" placeholder="Rechercher...">
                <button><i class="fas fa-search"></i></button>
            </div>

            <!-- Navigation & Icônes (Droite) -->
            <div class="header-right">
                <nav class="main-nav">
                    <a href="#">Épicerie</a>
                    <a href="#">Frais</a>
                    <a href="#">Boissons</a>
                    <a href="#">Promotions</a>
                </nav>
                <div class="user-actions">
                    <a href="#"><i class="fas fa-user"></i></a>
                    <a href="#" class="cart-btn">
                        <i class="fas fa-shopping-cart"></i>
                        <span class="badge">2</span>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main>
        <section class="hero">
            <h2>Le meilleur du terroir, livré chez vous</h2>
            <a href="#" class="btn-accent">Découvrir</a>
        </section>
        
        <section class="categories">
            <div class="container">
                <h2>Nos Catégories</h2>
                <div class="category-grid">
                    <!-- Fruits -->
                    <a href="#" class="category-card">
                        <div class="category-bg" style="background-image: url('https://images.unsplash.com/photo-1610832958506-aa56368176cf?auto=format&fit=crop&w=600&q=80');"></div>
                        <div class="category-content">
                            <h3>Fruits</h3>
                        </div>
                    </a>
                    <!-- Légumes -->
                    <a href="#" class="category-card">
                        <div class="category-bg" style="background-image: url('https://images.unsplash.com/photo-1597362925123-77861d3fbac7?auto=format&fit=crop&w=600&q=80');"></div>
                        <div class="category-content">
                            <h3>Légumes</h3>
                        </div>
                    </a>
                    <!-- Viandes -->
                    <a href="#" class="category-card">
                        <div class="category-bg" style="background-image: url('https://images.unsplash.com/photo-1607623814075-e51df1bdc82f?auto=format&fit=crop&w=600&q=80');"></div>
                        <div class="category-content">
                            <h3>Viandes</h3>
                        </div>
                    </a>
                    <!-- Crémerie -->
                    <a href="#" class="category-card">
                        <div class="category-bg" style="background-image: url('https://images.unsplash.com/photo-1628088062854-d1870b4553da?auto=format&fit=crop&w=600&q=80');"></div>
                        <div class="category-content">
                            <h3>Crémerie</h3>
                        </div>
                    </a>
                </div>
            </div>
        </section>

        <section class="products">
            <!-- Product list placeholder -->
        </section>
    </main>

    <footer class="site-footer">
        <div class="container">
            <p>&copy; 2024 Saveurs Locales. Tous droits réservés.</p>
        </div>
    </footer>
</body>
</html>
